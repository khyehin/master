name: Deploy to Ubuntu

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            whoami
            hostname
            pwd
            ls -la /var/www/html
            ls -la /var/www/html/mymaster33 || true
            ls -la /var/www/html/mymaster33/deploy.sh || true
            bash /var/www/html/mymaster33/deploy.sh